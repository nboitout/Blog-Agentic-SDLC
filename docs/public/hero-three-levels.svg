<svg width="560" height="380" viewBox="0 0 560 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Three levels</title>
  <desc id="desc">Agentic SDLC: how software delivery changes. Agentic engineering: how engineers work inside that model. Harness engineering: how agents are made reliable enough to participate.</desc>
  <rect x="20" y="20" width="520" height="340" rx="14" fill="#F8FAFC" stroke="#DDE3EA"/>
  <text x="48" y="68" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Three levels</text>

  <line x1="48" y1="90" x2="512" y2="90" stroke="#E2E8F0"/>

  <text x="48" y="138" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">Agentic SDLC</text>
  <text x="48" y="164" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">How software delivery changes</text>

  <line x1="48" y1="186" x2="512" y2="186" stroke="#E2E8F0"/>

  <text x="48" y="232" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">Agentic engineering</text>
  <text x="48" y="258" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">How engineers work inside that model</text>

  <line x1="48" y1="280" x2="512" y2="280" stroke="#E2E8F0"/>

  <text x="48" y="324" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">Harness engineering</text>
  <text x="48" y="350" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">How agents are made reliable enough to participate</text>
</svg>
